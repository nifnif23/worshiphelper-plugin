name: Build WorshipHelper MSI

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Silences the Node.js deprecation warning

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Find whichever WiX version is already on the runner
      - name: Set WiX environment variable
        run: |
          $wixPath = (Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset*" | Select-Object -First 1).FullName
          echo "WIX=$wixPath" >> $env:GITHUB_ENV
          echo "Found WiX at: $wixPath"

      - name: Restore NuGet packages
        run: nuget restore WorshipHelper.sln

      - name: Build VSTO (Release)
        run: |
          msbuild WorshipHelperVSTO\WorshipHelperVSTO.csproj `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /verbosity:minimal

      # Publish without signing - MSI is the deliverable, not ClickOnce.
      # SignManifests=false avoids the stale thumbprint baked into the .csproj.
      # BootstrapperEnabled=false skips setup.exe generation entirely.
      - name: Publish VSTO
        run: |
          msbuild WorshipHelperVSTO\WorshipHelperVSTO.csproj `
            /target:Publish `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /p:PublishDir="${env:GITHUB_WORKSPACE}\WorshipHelperVSTO\publish\" `
            /p:SignManifests=false `
            /p:BootstrapperEnabled=false `
            /verbosity:normal

      # Show what got published so we can debug if MSI step fails
      - name: List publish output
        run: |
          echo "=== Publish folder contents ==="
          Get-ChildItem -Recurse WorshipHelperVSTO\publish\ | Select-Object FullName
        continue-on-error: true

      - name: Build MSI
        run: |
          msbuild WorshipHelperSetup\WorshipHelperSetup.wixproj `
            /p:Configuration=Release `
            /p:Platform=x86 `
            /p:AddInFiles="${env:GITHUB_WORKSPACE}\WorshipHelperVSTO\publish\" `
            /verbosity:normal

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorshipHelperSetup
          path: WorshipHelperSetup\bin\Release\WorshipHelperSetup.msi
          if-no-files-found: error
