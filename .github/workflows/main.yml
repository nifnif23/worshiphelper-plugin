name: Build WorshipHelper MSI

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Silences the Node.js deprecation warning

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Find whichever WiX version is already on the runner
      - name: Set WiX environment variable
        run: |
          $wixPath = (Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset*" | Select-Object -First 1).FullName
          echo "WIX=$wixPath" >> $env:GITHUB_ENV
          echo "Found WiX at: $wixPath"

      - name: Restore NuGet packages
        run: nuget restore WorshipHelper.sln

      - name: Build VSTO (Release)
        run: |
          msbuild WorshipHelperVSTO\WorshipHelperVSTO.csproj `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /verbosity:minimal

      # -Type CodeSigningCert adds the Code Signing EKU that SignTool requires.
      # Import into both CurrentUser and LocalMachine so all MSBuild sub-processes can find it.
      - name: Generate self-signed certificate
        run: |
          $cert = New-SelfSignedCertificate `
            -Subject "CN=WorshipHelper" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -KeyExportPolicy Exportable `
            -KeySpec Signature `
            -KeyUsage DigitalSignature `
            -Type CodeSigningCert `
            -NotAfter (Get-Date).AddYears(5)
          $pwd = ConvertTo-SecureString -String "build123" -Force -AsPlainText
          $pfxPath = "$env:GITHUB_WORKSPACE\WorshipHelperVSTO\ci-cert.pfx"
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pwd | Out-Null
          $store = New-Object System.Security.Cryptography.X509Certificates.X509Store("My", "LocalMachine")
          $store.Open("ReadWrite")
          $store.Add($cert)
          $store.Close()
          echo "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          echo "PFX_PATH=$pfxPath" >> $env:GITHUB_ENV
          echo "Certificate generated: $($cert.Thumbprint)"

      - name: Publish VSTO
        run: |
          msbuild WorshipHelperVSTO\WorshipHelperVSTO.csproj `
            /target:Publish `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /p:PublishDir="${env:GITHUB_WORKSPACE}\WorshipHelperVSTO\publish\" `
            /p:SignManifests=true `
            /p:ManifestCertificateThumbprint="$env:CERT_THUMBPRINT" `
            /p:ManifestKeyFile="$env:PFX_PATH" `
            /p:ManifestCertificatePassword=build123 `
            /verbosity:normal

      # Show what got published so we can debug if MSI step fails
      - name: List publish output
        run: |
          echo "=== Publish folder contents ==="
          Get-ChildItem -Recurse WorshipHelperVSTO\publish\ | Select-Object FullName
          echo "=== bin\Release contents ==="
          Get-ChildItem -Recurse WorshipHelperVSTO\bin\Release\ | Select-Object FullName
        continue-on-error: true

      # WiX resolves $(var.WorshipHelperVSTO.TargetDir) from the ProjectReference automatically.
      # We strip the reference to avoid an x86 platform mismatch, then supply the path manually.
      # TargetDir must point to bin\Release\ (the plain build output), NOT the publish folder —
      # Product.wxs expects undecorated DLLs, not the .deploy files ClickOnce publish produces.
      - name: Remove VSTO project reference from WiX project
        run: |
          $wixproj = "WorshipHelperSetup\WorshipHelperSetup.wixproj"
          [xml]$xml = Get-Content $wixproj
          $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $ns.AddNamespace("ms", "http://schemas.microsoft.com/developer/msbuild/2003")
          $refs = $xml.SelectNodes("//ms:ProjectReference", $ns)
          foreach ($ref in $refs) { $ref.ParentNode.RemoveChild($ref) | Out-Null }
          $xml.Save((Resolve-Path $wixproj))
          echo "ProjectReference nodes removed: $($refs.Count)"

      - name: Build MSI
        run: |
          $targetDir = "$env:GITHUB_WORKSPACE\WorshipHelperVSTO\bin\Release\"
          msbuild WorshipHelperSetup\WorshipHelperSetup.wixproj `
            /p:Configuration=Release `
            /p:Platform=x86 `
            /p:DefineConstants="WorshipHelperVSTO.TargetDir=$targetDir" `
            /verbosity:normal

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorshipHelperSetup
          path: WorshipHelperSetup\bin\Release\**\WorshipHelperSetup.msi
          if-no-files-found: error
