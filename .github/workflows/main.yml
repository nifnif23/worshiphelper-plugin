name: Build WorshipHelper MSI

on:
  workflow_dispatch: # Lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: windows-2022 # Has Visual Studio 2022 + Office tools pre-installed

    steps:
      # 1. Check out your repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Add MSBuild to PATH
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 3. Install WiX Toolset v3 (needed to build the .msi)
      - name: Set WiX environment variable
        run: |
          $wixPath = (Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset*" | Select-Object -First 1).FullName
          echo "WIX=$wixPath" >> $env:GITHUB_ENV
          echo "Found WiX at: $wixPath"

      # 4. Restore NuGet packages
      - name: Restore NuGet packages
        run: nuget restore WorshipHelper.sln

      # 5. Build the VSTO add-in in Release mode
      - name: Build VSTO (Release)
        run: |
          msbuild WorshipHelperVSTO\WorshipHelperVSTO.csproj `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /verbosity:minimal

      # 6. Publish the VSTO add-in (creates the publish/ folder the MSI needs)
      - name: Publish VSTO
        run: |
          msbuild WorshipHelperVSTO\WorshipHelperVSTO.csproj `
            /target:Publish `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /p:PublishDir=publish\ `
            /verbosity:minimal

      # 7. Build the MSI via the WiX setup project
      - name: Build MSI
        run: |
          msbuild WorshipHelperSetup\WorshipHelperSetup.wixproj `
            /p:Configuration=Release `
            /p:Platform=x86 `
            /p:AddInFiles=..\WorshipHelperVSTO\publish\ `
            /verbosity:minimal

      # 8. Upload the .msi as a downloadable artifact
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorshipHelperSetup
          path: WorshipHelperSetup\bin\Release\WorshipHelperSetup.msi
          if-no-files-found: error
